server:
  port: 8081

spring:

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      ssl:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  jwt:
    secret: ${JWT_SECRET}
    access_expiration: 3600000 #1hour
    refresh_expiration: 2592000000 #30days

gateway:
  secret: ${GATEWAY_SECRET}

logging:
  level:
    root: INFO
    org.springframework.web.servlet.DispatcherServlet: WARN
    com.zaxxer.hikari: INFO